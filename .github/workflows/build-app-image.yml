name: Build and publish app image

# Builds the WhatsApp Reminder Platform's Home Assistant app image on
# GitHub's servers (not on-device) and publishes it to GHCR as a multi-arch
# (amd64 + arm64) image. This exists so a Raspberry Pi (or any small device)
# never has to run `npm install` / compile TypeScript itself - Supervisor
# just pulls the finished image once config.yaml's `image:` field points at
# it, instead of doing a local Docker build.

on:
  push:
    branches: [main]
    paths:
      - "whatsapp_reminder_platform/**"
      - "src/**"
      - "package.json"
      - "tsconfig.json"
      - "migrations/**"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' whatsapp_reminder_platform/config.yaml | sed -E 's/version: *"([^"]+)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: whatsapp_reminder_platform/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/whatsapp-reminder-platform:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/whatsapp-reminder-platform:latest

      - name: Summary
        run: |
          echo "Published ghcr.io/${{ github.repository_owner }}/whatsapp-reminder-platform:${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "First run only: go to your GitHub profile -> Packages -> whatsapp-reminder-platform -> Package settings -> Change visibility -> Public, so Home Assistant can pull it without authentication." >> "$GITHUB_STEP_SUMMARY"
